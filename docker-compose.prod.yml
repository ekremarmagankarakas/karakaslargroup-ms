version: "3.9"

services:
  backend:
    environment:
      USE_LOCALSTACK: "false"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      ALLOWED_ORIGINS: "https://karakaslar.online"
    volumes: []

  localstack:
    profiles:
      - dev
