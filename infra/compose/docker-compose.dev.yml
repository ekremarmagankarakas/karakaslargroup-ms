version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: kg
      POSTGRES_PASSWORD: kgpass
      POSTGRES_DB: kgdb
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../../apps/backend
      dockerfile: Dockerfile.dev
    env_file:
      - ../../apps/backend/.env.dev
    ports:
      - "8000:8000"
    volumes:
      - ../../apps/backend:/app
    depends_on:
      - db

  frontend:
    build:
      context: ../../apps/frontend
      dockerfile: Dockerfile.dev
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ../../apps/frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend

volumes:
  db_data:

