# Dev compose — hot reload for both frontend (Vite HMR) and backend (uvicorn --reload)
# Usage:
#   make dev           # start
#   make dev-down      # stop
#   make dev-logs-backend
#   make dev-logs-frontend
#   make seed   COMPOSE=docker-compose.dev.yml
#   make alembic-up COMPOSE=docker-compose.dev.yml

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: karakaslar
      POSTGRES_USER: karakaslar
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karakaslar"]
      interval: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-central-1
      AWS_DEFAULT_REGION: eu-central-1
    volumes:
      - localstack_data_dev:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-s3.sh
    ports:
      - "4566:4566"

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://karakaslar:${DB_PASSWORD}@db:5432/karakaslar
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      USE_LOCALSTACK: "true"
      LOCALSTACK_ENDPOINT: http://localstack:4566
      S3_BUCKET_NAME: karakaslar-uploads
      SMTP_HOST: smtp.hostinger.com
      SMTP_PORT: 465
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:5173","http://localhost:3000"]'
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./apps/backend:/app
      # Preserve the uv virtualenv installed during image build
      - backend_venv_dev:/app/.venv
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    environment:
      # Vite proxy target — routes /api/* to the backend container
      BACKEND_URL: http://backend:8000
    volumes:
      - ./apps/frontend:/usr/src/app
      # Preserve the node_modules installed during image build
      - frontend_node_modules_dev:/usr/src/app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data_dev:
  localstack_data_dev:
  backend_venv_dev:
  frontend_node_modules_dev:
