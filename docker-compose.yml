version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: karakaslar
      POSTGRES_USER: karakaslar
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karakaslar"]
      interval: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    restart: unless-stopped
    environment:
      SERVICES: s3
      DEFAULT_REGION: eu-central-1
      AWS_DEFAULT_REGION: eu-central-1
    volumes:
      - localstack_data:/var/lib/localstack
      - ./scripts/init-localstack.sh:/etc/localstack/init/ready.d/init-s3.sh
    ports:
      - "4566:4566"

  backend:
    build: ./apps/backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_started
    environment:
      DATABASE_URL: postgresql+asyncpg://karakaslar:${DB_PASSWORD}@db:5432/karakaslar
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      USE_LOCALSTACK: "true"
      LOCALSTACK_ENDPOINT: http://localstack:4566
      S3_BUCKET_NAME: karakaslar-uploads
      SMTP_HOST: smtp.hostinger.com
      SMTP_PORT: 465
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:3000"]'
    volumes:
      - ./apps/backend:/app

  frontend:
    build: ./apps/frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  localstack_data:
